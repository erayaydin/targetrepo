get:
  operationId: listAdoptions
  summary: List all adoption records
  responses:
    '200':
      description: A list of adoptions
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Adoption.yaml
post:
  operationId: createAdoption
  summary: Create a new adoption record
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Adoption.yaml
  responses:
    '201':
      description: Adoption created
